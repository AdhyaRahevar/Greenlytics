{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-split">
        <div class="auth-form-container">
            <div class="glass-form">
                <h2>Join GreenTracker</h2>
                <form action="/register" method="POST">
                    <div class="form-group">
                        <label>Choose Username</label>
                        <input type="text" name="username" required placeholder="Choose a username">
                    </div>
                    <div class="form-group">
                        <label>Create Password</label>
                        <input type="password" name="password" required placeholder="Create a secure password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                </form>
                <div class="auth-footer">
                    <p>Already have an account? <a href="/login">Login here</a></p>
                </div>
            </div>
        </div>
        <div class="auth-image register-image">
            <div class="image-overlay">
                <h2>Start Saving the Planet</h2>
                <p>Track sustainable products and get alerts when deals drop.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
